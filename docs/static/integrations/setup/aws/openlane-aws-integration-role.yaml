AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Creates a read-only cross-account IAM role for the Openlane AWS integration.
Parameters:
  RoleName:
    Type: String
    Default: OpenlaneIntegrationReadOnlyRole
    AllowedPattern: "[a-zA-Z0-9+=,.@_-]{1,64}"
    Description: IAM role name Openlane will assume.
  OpenlanePrincipalArn:
    Type: String
    Description: IAM principal ARN provided by Openlane for cross-account role trust.
  ExternalId:
    Type: String
    NoEcho: true
    Description: Unique external ID generated by your Openlane tenant.
  HomeRegion:
    Type: String
    Default: us-east-1
    Description: Security Hub aggregation home region used in Openlane.
  EnableIAMAccess:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Grant Openlane read access to IAM users and groups.
  EnableAuditConfig:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Grant Openlane read access to Config rules and Audit Manager assessments.

Conditions:
  IAMAccessEnabled: !Equals [!Ref EnableIAMAccess, "true"]
  AuditConfigEnabled: !Equals [!Ref EnableAuditConfig, "true"]

Resources:
  OpenlaneIntegrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Read-only role for Openlane AWS Security Hub and Audit Manager collection.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref OpenlanePrincipalArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: OpenlaneIntegrationReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: HealthCheckIdentity
                Effect: Allow
                Action:
                  - "securityhub:Describe*"
                Resource: "*"
              - Sid: SecurityHubReadFindings
                Effect: Allow
                Action:
                  - "securityhub:Get*"
                  - "securityhub:List*"
                  - "securityhub:BatchGet*"
                  - "securityhub:Describe*"
                Resource: "*"
              - !If
                - IAMAccessEnabled
                - Sid: IAMReadUsers
                  Effect: Allow
                  Action:
                    - iam:ListUsers
                    - iam:ListGroups
                    - iam:ListGroupsForUser
                    - iam:ListUserTags
                  Resource: "*"
                - !Ref AWS::NoValue
              - !If
                - AuditConfigEnabled
                - Sid: AuditConfigReadRules
                  Effect: Allow
                  Action:
                    - config:DescribeConfigRules
                    - config:DescribeComplianceByConfigRule
                    - controlcatalog:ListControls
                    - controlcatalog:ListControlMappings
                    - controlcatalog:ListCommonControls
                  Resource: "*"
                - !Ref AWS::NoValue

Outputs:
  RoleArn:
    Description: IAM role ARN to paste into Openlane as roleArn.
    Value: !GetAtt OpenlaneIntegrationRole.Arn
  ExternalId:
    Description: External ID to paste into Openlane as externalId.
    Value: !Ref ExternalId
  HomeRegion:
    Description: Security Hub home region to paste into Openlane as homeRegion.
    Value: !Ref HomeRegion
